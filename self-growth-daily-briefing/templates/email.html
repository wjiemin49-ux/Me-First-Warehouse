<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>$subject</title>
    <style>
      body {
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        background: #f6f4ee;
        color: #1f1f1f;
        line-height: 1.75;
        padding: 32px 18px;
      }
      .card {
        max-width: 760px;
        margin: 0 auto;
        background: #fffdfa;
        border: 1px solid #e5dccb;
        border-radius: 18px;
        padding: 32px;
        box-shadow: 0 18px 40px rgba(74, 50, 14, 0.08);
      }
      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #8a6f3e;
      }
      h1, h2 {
        color: #2f2415;
      }
      h1 {
        margin-bottom: 4px;
        font-size: 30px;
      }
      h2 {
        margin-top: 28px;
        font-size: 20px;
      }
      .theme {
        background: #f7efe0;
        border-left: 4px solid #b9822a;
        padding: 14px 16px;
        border-radius: 10px;
      }
      a {
        color: #8b5e17;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="eyebrow">Self-Growth Daily Briefing · $issue_date</div>
      <h1>$title</h1>
      <p class="theme"><strong>今日主题：</strong>$theme</p>
      <p><strong>写作角度：</strong>$angle</p>

      <h2>开头</h2>
      <p>$hook</p>

      <h2>为什么是现在</h2>
      <p>$why_now</p>

      <h2>核心洞察</h2>
      <p>$core_insight</p>

      <h2>成长体会</h2>
      <ul>
        $reflections_html
      </ul>

      <h2>今天就能开始的 3 个动作</h2>
      <ol>
        $actions_html
      </ol>

      <h2>结尾</h2>
      <p>$closing</p>

      <h2>参考来源</h2>
      <ul>
        $sources_html
      </ul>
    </div>
  </body>
</html>
