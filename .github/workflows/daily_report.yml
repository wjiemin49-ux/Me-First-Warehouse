name: daily-report

on:
  schedule:
    # GitHub Actions cron uses UTC; for 11:00 in UTC+8 use 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run report
        env:
          LOG_LEVEL: INFO
          X_USERS: ${{ secrets.X_USERS }}
          NITTER_BASE_URLS: ${{ secrets.NITTER_BASE_URLS }}
          WECHAT_RSS_URLS: ${{ secrets.WECHAT_RSS_URLS }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_SUBJECT: ${{ secrets.SMTP_SUBJECT }}
          SMTP_STARTTLS: ${{ secrets.SMTP_STARTTLS }}
          SMTP_SSL: ${{ secrets.SMTP_SSL }}
        run: python daily_report.py
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: report.md
