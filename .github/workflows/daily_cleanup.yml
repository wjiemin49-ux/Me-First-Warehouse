name: daily-cleanup

on:
  schedule:
    # GitHub Actions cron uses UTC; for 10:00 in UTC+8 use 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cleanup (dry-run by default)
        run: python daily_cleanup.py
